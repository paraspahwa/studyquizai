version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    restart: unless-stopped
    volumes:
      - ./backend/data:/app/data  # Persist SQLite database
    environment:
      - DATABASE_URL=sqlite:///./data/study_quiz_ai.db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
    driver: local
